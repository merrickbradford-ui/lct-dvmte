<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearby Restaurants - Find Great Places to Eat</title>
    <meta name="description" content="Discover the best restaurants near your current location with our interactive map and detailed listings.">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
          crossorigin=""/>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>🍽️ Nearby Restaurants</h1>
        <p>Discover great places to eat near your current location</p>
    </header>
    
    <main>
        <div class="container">
            <div id="map">
                <!-- Map will be loaded here -->
                <div class="loading">
                    <div class="loading-spinner"></div>
                </div>
            </div>
            
            <section class="restaurant-list" id="restaurant-list">
                <!-- Restaurant cards will be loaded here -->
                <div class="loading">
                    <div class="loading-spinner"></div>
                </div>
            </section>
        </div>
    </main>
    
    <footer>
        <p>&copy; 2025 Nearby Restaurants Finder | Powered by OpenStreetMap and Leaflet</p>
    </footer>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" 
            crossorigin=""></script>
    
    <!-- Custom JS -->
    <script src="js/app.js"></script>
</body>
</html>
