<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>附近徒步路线</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary-color: #2F4F4F;
            --bg-color: #f9f9f9;
            --text-color: #333;
            --accent-color: #4682b4;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 1rem;
            text-align: center;
        }
        main {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 60px);
        }
        #map {
            flex: 1;
            width: 100%;
            z-index: 0;
        }
        .trails-list {
            max-height: 300px;
            overflow-y: auto;
            padding: 1rem;
            background-color: white;
            border-top: 1px solid #ddd;
        }
        article {
            margin-bottom: 1rem;
            padding: 0.75rem;
            border-left: 4px solid var(--accent-color);
            background-color: #fafafa;
        }
        article h3 {
            margin-top: 0;
            color: var(--primary-color);
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            margin: 0.5rem;
        }
        button:hover {
            opacity: 0.9;
        }
        @media (min-width: 768px) {
            main {
                flex-direction: row;
            }
            .trails-list {
                width: 300px;
                max-height: unset;
                border-top: none;
                border-right: 1px solid #ddd;
            }
            #map {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>附近徒步路线</h1>
        <button id="locate-btn">定位我的位置</button>
    </header>
    <main>
        <div id="map"></div>
        <div class="trails-list" id="trails-container">
            <p>点击“定位我的位置”以查找附近的徒步路线。</p>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 初始化地图
        const map = L.map('map').setView([39.9042, 116.4074], 10); // 默认北京

        // 添加 OpenStreetMap 图层
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // 模拟徒步路线数据（实际项目中可从 API 获取）
        const mockTrails = [
            {
                id: 1,
                name: "香山徒步路线",
                distance: "5.2 公里",
                difficulty: "中等",
                latlng: [39.9917, 116.1944]
            },
            {
                id: 2,
                name: "西山国家森林公园",
                distance: "8.1 公里",
                difficulty: "困难",
                latlng: [39.9667, 116.2167]
            },
            {
                id: 3,
                name: "奥林匹克森林公园南园",
                distance: "3.5 公里",
                difficulty: "简单",
                latlng: [40.0033, 116.4036]
            }
        ];

        let userMarker = null;
        let trailMarkers = [];

        // 清除现有标记
        function clearMarkers() {
            if (userMarker) {
                map.removeLayer(userMarker);
                userMarker = null;
            }
            trailMarkers.forEach(marker => map.removeLayer(marker));
            trailMarkers = [];
        }

        // 显示模拟路线
        function showMockTrails(userPos) {
            const container = document.getElementById('trails-container');
            container.innerHTML = '<h3>附近徒步路线</h3>';

            mockTrails.forEach(trail => {
                // 计算距离（简化版）
                const dx = (trail.latlng[1] - userPos.lng) * Math.cos((userPos.lat + trail.latlng[0]) / 2);
                const dy = trail.latlng[0] - userPos.lat;
                const distKm = Math.sqrt(dx*dx + dy*dy) * 111; // 粗略估算（1度≈111公里）

                if (distKm <= 50) { // 只显示50公里内
                    const article = document.createElement('article');
                    article.innerHTML = `
                        <h3>${trail.name}</h3>
                        <p>距离: ${distKm.toFixed(1)} 公里</p>
                        <p>长度: ${trail.distance} | 难度: ${trail.difficulty}</p>
                    `;
                    container.appendChild(article);

                    // 添加地图标记
                    const marker = L.marker(trail.latlng).addTo(map)
                        .bindPopup(`<b>${trail.name}</b><br>距离: ${distKm.toFixed(1)} 公里`);
                    trailMarkers.push(marker);
                }
            });

            if (container.children.length === 1) {
                container.innerHTML += '<p>附近暂无徒步路线。</p>';
            }
        }

        // 定位按钮事件
        document.getElementById('locate-btn').addEventListener('click', () => {
            clearMarkers();
            if (!navigator.geolocation) {
                alert('您的浏览器不支持地理定位。');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const userPos = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };

                    // 添加用户位置标记
                    userMarker = L.marker([userPos.lat, userPos.lng], {
                        title: '您的位置'
                    }).addTo(map).bindPopup('这是您的当前位置').openPopup();

                    map.setView([userPos.lat, userPos.lng], 12);
                    showMockTrails(userPos);
                },
                (error) => {
                    console.error('Geolocation error:', error);
                    alert('无法获取您的位置。请确保已授权位置权限。');
                    // 使用默认位置
                    const defaultPos = { lat: 39.9042, lng: 116.4074 };
                    userMarker = L.marker([defaultPos.lat, defaultPos.lng]).addTo(map)
                        .bindPopup('默认位置：北京').openPopup();
                    map.setView([defaultPos.lat, defaultPos.lng], 10);
                    showMockTrails(defaultPos);
                }
            );
        });
    </script>
</body>
</html>
