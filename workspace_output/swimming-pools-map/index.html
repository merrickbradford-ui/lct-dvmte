<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>附近游泳馆地图</title>
    <meta name="description" content="查找您附近的游泳馆，查看详细信息和位置">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
          crossorigin=""/>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>🏊 附近游泳馆</h1>
        <p>发现您身边的游泳场所</p>
    </header>

    <main>
        <section class="controls">
            <button id="locate-btn" class="primary-btn">定位我的位置</button>
            <div id="status-message" class="status-message"></div>
        </section>

        <section class="map-container">
            <div id="map"></div>
        </section>

        <section class="pools-list">
            <h2>附近游泳馆</h2>
            <div id="pools-cards" class="pools-grid">
                <!-- 游泳馆卡片将通过JavaScript动态生成 -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 附近游泳馆地图 | 使用 OpenStreetMap 和 Leaflet.js</p>
    </footer>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" 
            crossorigin=""></script>
    
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
