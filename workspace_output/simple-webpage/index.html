<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单网页示例</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>欢迎来到我的简单网页</h1>
            <p>这是一个使用HTML、CSS和JavaScript创建的基本网页示例</p>
        </header>
        
        <main>
            <section class="features">
                <h2>网页特点</h2>
                <ul>
                    <li>响应式设计 - 在不同设备上都能良好显示</li>
                    <li>简洁美观的界面</li>
                    <li>交互功能 - 点击按钮可以改变页面内容</li>
                    <li>现代CSS样式</li>
                </ul>
            </section>
            
            <section class="interactive">
                <h2>交互演示</h2>
                <button id="changeColor">点击改变背景颜色</button>
                <button id="showMessage">点击显示消息</button>
                <div id="message"></div>
            </section>
        </main>
        
        <footer>
            <p>&copy; 2024 简单网页示例. 所有权利保留.</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
