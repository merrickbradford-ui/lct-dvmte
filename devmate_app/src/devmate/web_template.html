<!DOCTYPE html>
<html lang='zh-CN'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>DevMate</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:"Microsoft YaHei","PingFang SC","Segoe UI",sans-serif;background:#f7f7f8;color:#111827}.layout{display:flex;min-height:100vh}.sidebar{width:296px;flex:0 0 296px;background:#fcfcfd;border-right:1px solid #e5e7eb;padding:18px 14px;display:flex;flex-direction:column;gap:12px;position:sticky;top:0;height:100vh;overflow:auto;transition:width .2s ease,padding .2s ease,flex-basis .2s ease}.sidebar.collapsed{width:72px;flex-basis:72px;padding:18px 10px}.sidebar-top,.projects-head{display:flex;align-items:center;justify-content:space-between;gap:10px}.sidebar-title{font-size:15px;font-weight:700;color:#111827;white-space:nowrap}.sidebar-subtitle,.project-type,.process-title,.status,.project-time{font-size:12px;color:#6b7280}.sidebar.collapsed .sidebar-title,.sidebar.collapsed .sidebar-subtitle,.sidebar.collapsed .project-meta,.sidebar.collapsed .project-actions,.sidebar.collapsed .projects-head{display:none}.sidebar-toggle{border:none;background:#eef2ff;color:#3730a3;border-radius:12px;padding:10px 12px;cursor:pointer;font:inherit}.projects-wrap,.projects-list,.page,.messages,.process-list{display:flex;flex-direction:column}.projects-wrap{gap:10px;min-height:0}.projects-list{gap:10px;overflow:auto;padding-right:2px}.project-item{display:flex;flex-direction:column;gap:10px;padding:12px;border:1px solid #e5e7eb;border-radius:16px;background:#fff}.project-item.latest{border-color:#bfdbfe;box-shadow:0 8px 24px rgba(37,99,235,.08)}.project-meta{display:flex;flex-direction:column;gap:4px}.project-name{font-size:14px;font-weight:700;color:#111827;word-break:break-word}.project-actions,.actions{display:flex;justify-content:flex-end}.project-badge{display:inline-flex;align-items:center;gap:6px;width:max-content;padding:4px 8px;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-size:11px;font-weight:700}.main{flex:1;min-width:0}.page{max-width:980px;margin:0 auto;min-height:100vh;padding:20px 16px 24px}.top{display:flex;justify-content:flex-end;min-height:48px}.session{display:none;gap:14px;flex-wrap:wrap;font-size:13px;color:#6b7280}.session.show{display:flex}.badge{display:inline-block;padding:4px 10px;border-radius:999px;background:#eef2ff;color:#3730a3}.hero{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px 0}.hero.hidden{display:none}.hero h1{margin:0;font-size:44px;line-height:1.15;font-weight:700;color:#111827}.messages{gap:12px;flex:1;min-height:0;overflow:auto;padding:0 4px 18px}.msg{display:flex;align-items:flex-start;gap:10px}.msg.user{justify-content:flex-end}.msg.user .avatar{order:2}.msg.user .bubble{order:1}.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:0 0 36px;font-size:18px;border:1px solid #dbe4ff;background:linear-gradient(180deg,#ffffff 0%,#eef2ff 100%);box-shadow:0 6px 16px rgba(37,99,235,.10)}.avatar.agent{border-color:#bae6fd;background:linear-gradient(180deg,#ecfeff 0%,#dbeafe 100%)}.avatar.user{border-color:#c4b5fd;background:linear-gradient(180deg,#faf5ff 0%,#ede9fe 100%)}.avatar.process{background:#f3f4f6;border-color:#e5e7eb;color:#6b7280}.bubble{max-width:min(78%,720px);padding:12px 14px;border-radius:16px;line-height:1.6;white-space:pre-wrap;word-break:break-word;border:1px solid transparent}.msg.user .bubble{background:#2563eb;color:#fff}.msg.agent .bubble{background:#f3f4f6;color:#111827;border-color:#e5e7eb}.process-wrap{display:none;margin:0 4px 14px}.process-wrap.show{display:block}.process-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}.process-list{display:none;gap:10px;padding:10px;border:1px solid #e9d5ff;background:#faf5ff;border-radius:14px;max-height:220px;overflow:auto}.process-list.show{display:flex}.msg.process .bubble{max-width:100%;background:#faf5ff;color:#6b21a8;border-color:#d8b4fe;font-size:13px}.panel{position:sticky;bottom:14px;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border:1px solid #e5e7eb;border-radius:22px;box-shadow:0 18px 50px rgba(15,23,42,.08);padding:10px 12px}.composer-row{display:flex;align-items:flex-end;gap:12px}.composer{flex:1;min-width:0}.composer textarea{width:100%;min-height:44px;max-height:108px;resize:vertical;padding:10px 12px;border:none;outline:none;font:inherit;line-height:1.5;background:transparent;color:#111827}.actions{align-items:center;gap:8px;flex:0 0 auto}.btn{border:none;border-radius:12px;padding:10px 14px;font:inherit;cursor:pointer;white-space:nowrap}.primary{background:#111827;color:#fff}.secondary{background:#f3f4f6;color:#374151}.ghost{background:#fff;border:1px solid #e5e7eb;color:#374151}.status{text-align:right;margin-top:6px;padding-right:2px}.status.ok{color:#047857}.status.loading{color:#1d4ed8}.status.error{color:#b91c1c}@media (max-width:960px){.layout{display:block}.sidebar{position:relative;top:auto;height:auto;width:100%;flex-basis:auto;border-right:none;border-bottom:1px solid #e5e7eb}.sidebar.collapsed{width:100%;flex-basis:auto;padding:14px}.sidebar.collapsed .sidebar-title,.sidebar.collapsed .sidebar-subtitle,.sidebar.collapsed .project-meta,.sidebar.collapsed .project-actions,.sidebar.collapsed .projects-head{display:flex}.page{min-height:auto}}@media (max-width:720px){.page{padding:16px 12px 20px}.hero h1{font-size:34px}.bubble{max-width:100%}.composer-row{align-items:stretch;flex-direction:column}.actions{justify-content:flex-end}}
</style>
</head>
<body>
<div class='layout'>
<aside id='sidebar' class='sidebar'>
<div class='sidebar-top'><div><div class='sidebar-title'>生成结果预览</div><div class='sidebar-subtitle'>可展开、可收起</div></div><button id='sidebarToggleBtn' class='sidebar-toggle' type='button' onclick='toggleSidebar()'>收起</button></div>
<div class='projects-wrap'><div class='projects-head'><div class='sidebar-subtitle'>项目列表</div><button id='refreshProjectsBtn' class='btn ghost' type='button' onclick='loadProjects(true)'>刷新列表</button></div><div id='projectsList' class='projects-list'></div></div>
</aside>
<main class='main'><div class='page'>
<div class='top'><div id='sessionBar' class='session'><div>会话：<span id='sessionId'>-</span></div><div>状态：<span id='sessionState' class='badge'>IDLE</span></div><div>步骤：<span id='sessionSteps'>0</span></div></div></div>
<div id='hero' class='hero'><h1>有什么我能帮你的吗？</h1></div>
<div id='messages' class='messages'></div>
<div id='processWrap' class='process-wrap'><div class='process-head'><div class='process-title'>执行过程与运行状态</div><button id='toggleProcessBtn' class='btn ghost' type='button' onclick='toggleProcessPanel()'>查看执行过程</button></div><div id='processList' class='process-list'></div></div>
<div class='panel'><div class='composer-row'><div class='composer'><textarea id='input' placeholder='给 DevMate 一个任务，例如：请用中文介绍你能做什么。'></textarea></div><div class='actions'><button class='btn secondary' type='button' onclick='resetSession()'>新对话</button><button class='btn primary' id='sendBtn' type='button' onclick='sendMessage()'>发送</button></div></div><div id='footerStatus' class='status'>Ctrl + Enter 发送</div></div>
</div></main>
</div>
<script>
let sessionId=localStorage.getItem('devmate_session_id')||'',lastEventCount=0,processExpanded=false,processCount=0,sidebarCollapsed=false;
function showHero(show){document.getElementById('hero').classList.toggle('hidden',!show)}
function setFooterStatus(text,kind){const footer=document.getElementById('footerStatus');footer.textContent=text;footer.className='status'+(kind?' '+kind:'')}
function updateSessionBar(id,state,steps){const bar=document.getElementById('sessionBar');bar.classList.add('show');document.getElementById('sessionId').textContent=id?id.slice(0,8)+'...':'-';document.getElementById('sessionState').textContent=state||'IDLE';document.getElementById('sessionSteps').textContent=String(steps||0)}
function resetSessionBar(){updateSessionBar(sessionId,'IDLE',0)}
function getAvatar(role){if(role==='user')return '🧑';if(role==='agent')return '🤖';return '🛠️'}
function addMessage(role,text,targetId){const root=document.getElementById(targetId||'messages'),row=document.createElement('div'),avatar=document.createElement('div'),bubble=document.createElement('div');row.className='msg '+role;avatar.className='avatar '+role;avatar.textContent=getAvatar(role);bubble.className='bubble';bubble.textContent=text;row.appendChild(avatar);row.appendChild(bubble);root.appendChild(row);root.scrollTop=root.scrollHeight}
function addProcessMessage(text){processCount+=1;document.getElementById('processWrap').classList.add('show');addMessage('process',text,'processList')}
function toggleProcessPanel(){processExpanded=!processExpanded;document.getElementById('processList').classList.toggle('show',processExpanded);document.getElementById('toggleProcessBtn').textContent=processExpanded?'收起执行过程':'查看执行过程'}
function toggleSidebar(){sidebarCollapsed=!sidebarCollapsed;document.getElementById('sidebar').classList.toggle('collapsed',sidebarCollapsed);document.getElementById('sidebarToggleBtn').textContent=sidebarCollapsed?'展开':'收起'}
function isProcessEvent(type){return['thinking','tool_plan','tool_started','tool_finished','step_started','run_started','run_finished','agent_ready','final_answer','error'].includes(type)}
function formatProjectTime(value){const date=new Date(Number(value)*1000);if(Number.isNaN(date.getTime()))return '';return date.toLocaleString('zh-CN',{hour12:false})}
async function pollEvents(currentSessionId){const response=await fetch('/events/'+currentSessionId),data=await response.json(),events=data.events||[];for(let i=lastEventCount;i<events.length;i+=1){const event=events[i],type=event.type||'event',message=event.message||type;if(isProcessEvent(type))addProcessMessage(message)}lastEventCount=events.length}
async function loadProjects(fromRefresh){const refreshBtn=document.getElementById('refreshProjectsBtn');if(refreshBtn){refreshBtn.disabled=true;refreshBtn.textContent='刷新中...'}if(fromRefresh)setFooterStatus('正在刷新项目列表...','loading');try{const response=await fetch('/projects'),data=await response.json(),projects=(data.projects||[]).slice().sort(function(a,b){return Number(b.updated_at||0)-Number(a.updated_at||0)}),list=document.getElementById('projectsList');list.innerHTML='';if(!projects.length){const empty=document.createElement('div');empty.className='sidebar-subtitle';empty.textContent='暂无生成项目';list.appendChild(empty);if(fromRefresh)setFooterStatus('刷新完成，当前没有项目。','ok');return}projects.forEach(function(project,index){const item=document.createElement('div'),meta=document.createElement('div'),name=document.createElement('div'),type=document.createElement('div'),time=document.createElement('div'),actions=document.createElement('div'),openBtn=document.createElement('button');item.className='project-item'+(index===0?' latest':'');meta.className='project-meta';if(index===0){const badge=document.createElement('div');badge.className='project-badge';badge.textContent='最新生成';meta.appendChild(badge)}name.className='project-name';name.textContent=project.name;type.className='project-type';type.textContent='类型：'+(project.type||'folder');time.className='project-time';time.textContent='更新时间：'+(formatProjectTime(project.updated_at)||'未知');actions.className='project-actions';openBtn.className='btn ghost';openBtn.type='button';openBtn.textContent=project.type==='python'?'启动并预览':'打开预览';openBtn.onclick=function(){openPreview(project.name)};meta.appendChild(name);meta.appendChild(type);meta.appendChild(time);actions.appendChild(openBtn);item.appendChild(meta);item.appendChild(actions);list.appendChild(item)});if(fromRefresh)setFooterStatus('项目列表已刷新。','ok')}catch(error){if(fromRefresh)setFooterStatus('刷新失败：'+error.message,'error')}finally{if(refreshBtn){refreshBtn.disabled=false;refreshBtn.textContent='刷新列表'}}}
async function openPreview(projectName){setFooterStatus('正在打开预览...','loading');try{const response=await fetch('/preview/'+encodeURIComponent(projectName),{method:'POST'}),data=await response.json();setFooterStatus(data.preview_url?(window.open(data.preview_url,'_blank'),'已打开预览：'+projectName):'预览失败：'+projectName,data.preview_url?'ok':'error')}catch(error){setFooterStatus('预览失败：'+error.message,'error')}}
async function sendMessage(){const input=document.getElementById('input'),button=document.getElementById('sendBtn'),message=input.value.trim();if(!message)return;showHero(false);addMessage('user',message,'messages');input.value='';button.disabled=true;button.textContent='发送中...';setFooterStatus('正在请求模型...','loading');lastEventCount=0;processCount=0;processExpanded=false;document.getElementById('processList').innerHTML='';document.getElementById('processList').classList.remove('show');document.getElementById('processWrap').classList.remove('show');document.getElementById('toggleProcessBtn').textContent='查看执行过程';let currentSessionId=sessionId||crypto.randomUUID().replaceAll('-','');updateSessionBar(currentSessionId,'RUNNING',0);const poller=setInterval(function(){pollEvents(currentSessionId).catch(function(){})},800);try{const response=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:message,session_id:currentSessionId||null})}),data=await response.json();sessionId=data.session_id||currentSessionId;localStorage.setItem('devmate_session_id',sessionId);await pollEvents(sessionId);addMessage('agent',data.result||'(empty response)','messages');await loadProjects(false);setTimeout(function(){loadProjects(false).catch(function(){})},1200);resetSessionBar();setFooterStatus(processCount>0?'执行完成，可查看执行过程':'执行完成','ok')}catch(error){addMessage('agent','请求失败：'+error.message,'messages');updateSessionBar(currentSessionId,'ERROR',0);setFooterStatus('请求失败','error')}finally{clearInterval(poller);button.disabled=false;button.textContent='发送'}}
function resetSession(){sessionId='';lastEventCount=0;processCount=0;processExpanded=false;localStorage.removeItem('devmate_session_id');document.getElementById('messages').innerHTML='';document.getElementById('processList').innerHTML='';document.getElementById('processList').classList.remove('show');document.getElementById('processWrap').classList.remove('show');document.getElementById('toggleProcessBtn').textContent='查看执行过程';document.getElementById('sessionBar').classList.remove('show');setFooterStatus('Ctrl + Enter 发送','');updateSessionBar('','IDLE',0);showHero(true);loadProjects(false)}
document.getElementById('input').addEventListener('keydown',function(event){if(event.key==='Enter'&&event.ctrlKey)sendMessage()});if(sessionId){updateSessionBar(sessionId,'IDLE',0);showHero(false)}loadProjects(false);
</script>
</body>
</html>
