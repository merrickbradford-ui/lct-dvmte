<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DevMate</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:"Microsoft YaHei","PingFang SC","Segoe UI",sans-serif;background:#f6f7fb;color:#111827}
.layout{display:flex;min-height:100vh}
.sidebar{width:300px;background:#fff;border-right:1px solid #e5e7eb;padding:16px;display:flex;flex-direction:column;gap:12px}
.sidebar h2{margin:0;font-size:16px}
.sidebar .sub{font-size:12px;color:#6b7280}
.projects{display:flex;flex-direction:column;gap:8px;overflow:auto}
.project{border:1px solid #e5e7eb;border-radius:12px;padding:10px;background:#fcfcff}
.project .name{font-weight:700;font-size:14px}
.project .meta{font-size:12px;color:#6b7280;margin-top:4px}
.main{flex:1;display:block}
.page{width:100%;max-width:1120px;margin:0 auto;padding:14px 18px 18px;display:flex;flex-direction:column;gap:10px}
.session{display:flex;flex-wrap:wrap;gap:10px;font-size:13px;color:#4b5563}
.badge{background:#eef2ff;color:#3730a3;border-radius:999px;padding:4px 8px}
.hero{padding:4px 0;text-align:left}
.hero h1{margin:0;font-size:20px}
.messages{display:flex;flex-direction:column;gap:10px;min-height:220px;max-height:52vh;overflow:auto;padding-right:4px}
.msg{display:flex;gap:8px;align-items:flex-start}
.msg.user{justify-content:flex-end}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid #dbeafe;background:#eff6ff}
.bubble{max-width:78%;padding:10px 12px;border-radius:12px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.msg.user .bubble{background:#2563eb;color:#fff}
.msg.agent .bubble{background:#f3f4f6;border:1px solid #e5e7eb}
.msg.process .bubble{max-width:100%;background:#faf5ff;color:#6b21a8;border:1px solid #e9d5ff;font-size:13px}
.process{border:1px solid #e9d5ff;background:#faf5ff;border-radius:12px;padding:10px}
.process-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.process-list{display:none;flex-direction:column;gap:8px;max-height:220px;overflow:auto}
.process-list.show{display:flex}
.panel{position:sticky;bottom:8px;background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:10px;box-shadow:0 12px 28px rgba(17,24,39,.08)}
textarea{width:100%;min-height:44px;max-height:120px;border:none;outline:none;font:inherit;resize:vertical}
.row{display:flex;gap:8px;align-items:flex-end}
.actions{display:flex;gap:8px}
.btn{border:none;border-radius:10px;padding:9px 12px;cursor:pointer;font:inherit}
.btn.primary{background:#111827;color:#fff}
.btn.secondary{background:#f3f4f6;color:#111827}
.btn.ghost{background:#fff;border:1px solid #e5e7eb;color:#374151}
.status{text-align:right;font-size:12px;color:#6b7280;margin-top:6px}
.status.loading{color:#1d4ed8}
.status.ok{color:#047857}
.status.error{color:#b91c1c}
@media (max-width:920px){.layout{display:block}.sidebar{width:100%;border-right:none;border-bottom:1px solid #e5e7eb}.bubble{max-width:100%}.page{padding:12px}.row{flex-direction:column;align-items:stretch}.actions{justify-content:flex-end}}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <h2>生成结果预览</h2>
    <div class="sub">最新项目会显示在顶部</div>
    <div>
      <button class="btn ghost" id="refreshProjectsBtn" type="button" onclick="loadProjects(true)">刷新列表</button>
    </div>
    <div id="projectsList" class="projects"></div>
  </aside>

  <main class="main">
    <div class="page">
      <div id="sessionBar" class="session">
        <div>会话：<span id="sessionId">-</span></div>
        <div>状态：<span id="sessionState" class="badge">IDLE</span></div>
        <div>步骤：<span id="sessionSteps">0</span></div>
        <div>Trace：<a id="traceLink" target="_blank" rel="noopener noreferrer">-</a></div>
      </div>

      <div id="hero" class="hero">
        <h1>请输入任务，我会开始生成项目与代码</h1>
      </div>

      <div id="messages" class="messages"></div>

      <div id="processWrap" class="process" style="display:none">
        <div class="process-head">
          <strong>执行过程与运行状态</strong>
          <button id="toggleProcessBtn" class="btn ghost" type="button" onclick="toggleProcessPanel()">查看执行过程</button>
        </div>
        <div id="processList" class="process-list"></div>
      </div>

      <div class="panel">
        <div class="row">
          <textarea id="input" placeholder="例如：我想构建一个展示附近徒步路线的网站项目。"></textarea>
          <div class="actions">
            <button class="btn secondary" type="button" onclick="resetSession()">新对话</button>
            <button class="btn primary" id="sendBtn" type="button" onclick="sendMessage()">发送</button>
          </div>
        </div>
        <div id="footerStatus" class="status">Ctrl + Enter 发送</div>
      </div>
    </div>
  </main>
</div>

<script>
let sessionId=localStorage.getItem('devmate_session_id')||'';
let lastEventCount=0;
let processExpanded=false;
let processCount=0;

function showHero(show){document.getElementById('hero').style.display=show?'block':'none'}
function setFooterStatus(text,kind){const el=document.getElementById('footerStatus');el.textContent=text;el.className='status'+(kind?' '+kind:'')}
function updateSessionBar(id,state,steps){document.getElementById('sessionId').textContent=id?id.slice(0,8)+'...':'-';document.getElementById('sessionState').textContent=state||'IDLE';document.getElementById('sessionSteps').textContent=String(steps||0)}
function setTraceLink(url){const link=document.getElementById('traceLink');if(!url){link.textContent='-';link.removeAttribute('href');return}link.textContent='查看';link.href=url}
function getAvatar(role){if(role==='user')return '🧑';if(role==='agent')return '🤖';return '🛠️'}
function addMessage(role,text,targetId){const root=document.getElementById(targetId||'messages');const row=document.createElement('div');const avatar=document.createElement('div');const bubble=document.createElement('div');row.className='msg '+role;avatar.className='avatar '+role;avatar.textContent=getAvatar(role);bubble.className='bubble';bubble.textContent=text;row.appendChild(avatar);row.appendChild(bubble);root.appendChild(row);root.scrollTop=root.scrollHeight}
function addProcessMessage(text){processCount+=1;document.getElementById('processWrap').style.display='block';addMessage('process',text,'processList')}
function toggleProcessPanel(){processExpanded=!processExpanded;document.getElementById('processList').classList.toggle('show',processExpanded);document.getElementById('toggleProcessBtn').textContent=processExpanded?'收起执行过程':'查看执行过程'}
function isProcessEvent(type){return['thinking','tool_plan','tool_started','tool_finished','step_started','run_started','run_finished','agent_ready','final_answer','error'].includes(type)}
function formatProjectTime(v){const d=new Date(Number(v)*1000);if(Number.isNaN(d.getTime()))return '未知';return d.toLocaleString('zh-CN',{hour12:false})}

async function pollEvents(currentSessionId){
  const res=await fetch('/events/'+currentSessionId);
  const data=await res.json();
  const events=data.events||[];
  for(let i=lastEventCount;i<events.length;i+=1){
    const e=events[i];
    if(isProcessEvent(e.type||'')) addProcessMessage(e.message||e.type||'event');
  }
  lastEventCount=events.length;
}

async function loadProjects(fromRefresh){
  const btn=document.getElementById('refreshProjectsBtn');
  if(btn){btn.disabled=true;btn.textContent='刷新中...'}
  if(fromRefresh) setFooterStatus('正在刷新项目列表...','loading');
  try{
    const res=await fetch('/projects');
    const data=await res.json();
    const list=document.getElementById('projectsList');
    list.innerHTML='';
    const projects=(data.projects||[]).slice().sort((a,b)=>Number(b.updated_at||0)-Number(a.updated_at||0));
    if(!projects.length){const empty=document.createElement('div');empty.className='sub';empty.textContent='暂无生成项目';list.appendChild(empty);if(fromRefresh)setFooterStatus('刷新完成，当前没有项目。','ok');return}
    projects.forEach((p,idx)=>{
      const card=document.createElement('div');card.className='project';
      const name=document.createElement('div');name.className='name';
      const displayName=p.name==='__workspace__'?'workspace_output（根目录）':p.name;
      name.textContent=(idx===0?'[最新] ':'')+displayName;
      const meta=document.createElement('div');meta.className='meta';meta.textContent='类型：'+(p.type||'folder')+' ｜ 更新时间：'+formatProjectTime(p.updated_at);
      const btnWrap=document.createElement('div');btnWrap.style.marginTop='8px';
      const open=document.createElement('button');open.className='btn ghost';open.type='button';open.textContent=p.type==='python'?'启动并预览':'打开预览';open.onclick=()=>openPreview(p.name);
      btnWrap.appendChild(open);card.appendChild(name);card.appendChild(meta);card.appendChild(btnWrap);list.appendChild(card);
    });
    if(fromRefresh)setFooterStatus('项目列表已刷新。','ok');
  }catch(e){if(fromRefresh)setFooterStatus('刷新失败：'+e.message,'error')}
  finally{if(btn){btn.disabled=false;btn.textContent='刷新列表'}}
}

async function openPreview(projectName){
  setFooterStatus('正在打开预览...','loading');
  try{
    const res=await fetch('/preview/'+encodeURIComponent(projectName),{method:'POST'});
    const data=await res.json();
    if(data.preview_url){
      const popup=window.open(data.preview_url,'_blank');
      if(!popup){
        setFooterStatus('浏览器拦截了弹窗，请允许弹窗后重试。','error');
      }else{
        setFooterStatus('已打开预览（已强制禁用缓存）：'+projectName,'ok');
      }
      return;
    }
    setFooterStatus('预览失败：'+projectName,'error');
  }catch(e){setFooterStatus('预览失败：'+e.message,'error')}
}

async function sendMessage(){
  const input=document.getElementById('input');
  const button=document.getElementById('sendBtn');
  const message=input.value.trim();
  if(!message) return;

  showHero(false);
  addMessage('user',message,'messages');
  input.value='';
  button.disabled=true;
  button.textContent='发送中...';
  setFooterStatus('正在请求模型...','loading');

  lastEventCount=0;
  processCount=0;
  processExpanded=false;
  document.getElementById('processList').innerHTML='';
  document.getElementById('processList').classList.remove('show');
  document.getElementById('processWrap').style.display='none';
  document.getElementById('toggleProcessBtn').textContent='查看执行过程';

  const currentSessionId=sessionId||crypto.randomUUID().replaceAll('-','');
  updateSessionBar(currentSessionId,'RUNNING',0);
  setTraceLink('');

  const poller=setInterval(()=>{pollEvents(currentSessionId).catch(()=>{})},700);
  try{
    const res=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message,session_id:currentSessionId||null,mode:'deep'})});
    const data=await res.json();
    sessionId=data.session_id||currentSessionId;
    localStorage.setItem('devmate_session_id',sessionId);

    await pollEvents(sessionId);
    addMessage('agent',data.result||'(empty response)','messages');
    updateSessionBar(sessionId,data.state||'FINISHED',data.steps||1);
    setTraceLink(data.trace_url||'');

    if(data.trace_url){addProcessMessage('Trace 已生成，可点击顶部 Trace 链接查看。')}

    await loadProjects(false);
    setTimeout(()=>{loadProjects(false).catch(()=>{})},1000);
    if((data.state||'').toUpperCase()==='ERROR'){
      setFooterStatus('执行失败，请查看返回信息与执行过程。','error');
    }else{
      setFooterStatus(processCount>0?'执行完成，可查看执行过程':'执行完成','ok');
    }
  }catch(e){
    addMessage('agent','请求失败：'+e.message,'messages');
    updateSessionBar(currentSessionId,'ERROR',0);
    setFooterStatus('请求失败','error');
  }finally{
    clearInterval(poller);
    button.disabled=false;
    button.textContent='发送';
  }
}

function resetSession(){
  sessionId='';
  lastEventCount=0;
  processCount=0;
  processExpanded=false;
  localStorage.removeItem('devmate_session_id');
  document.getElementById('messages').innerHTML='';
  document.getElementById('processList').innerHTML='';
  document.getElementById('processList').classList.remove('show');
  document.getElementById('processWrap').style.display='none';
  document.getElementById('toggleProcessBtn').textContent='查看执行过程';
  updateSessionBar('','IDLE',0);
  setTraceLink('');
  setFooterStatus('Ctrl + Enter 发送','');
  showHero(true);
  loadProjects(false);
}

document.getElementById('input').addEventListener('keydown',function(event){if(event.key==='Enter'&&event.ctrlKey)sendMessage()});
if(sessionId){updateSessionBar(sessionId,'IDLE',0);showHero(false)}
loadProjects(false);
</script>
</body>
</html>
